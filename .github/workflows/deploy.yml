name: Deploy to globbin.se

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Debug locate marvel-legendary
        run: |
          sudo apt-get install -y sshpass > /dev/null
          echo "--- find marvel-legendary (depth 6) ---"
          sshpass -p '${{ secrets.FTP_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p 22 '${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}' find . -maxdepth 6 -iname '*marvel*' 2>&1
          echo "--- ls -la webroots/by-route ---"
          sshpass -p '${{ secrets.FTP_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p 22 '${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}' ls -la webroots/by-route/ 2>&1
          echo "--- stat necromunda vs marvel dirs if found ---"
          sshpass -p '${{ secrets.FTP_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p 22 '${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}' bash -c "readlink -f webroots/www/necromunda-gang-manager 2>&1; find / -maxdepth 8 -iname 'marvel-legendary' -type d 2>/dev/null"

      - name: Deploy frontend
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: ./frontend/dist/*
          remote_path: ${{ secrets.FTP_FRONTEND_DIR }}

      - name: Deploy frontend assets
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: ./frontend/dist/assets/*
          remote_path: ${{ secrets.FTP_FRONTEND_DIR }}assets

      - name: Deploy backend
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: ./backend/api/*
          remote_path: ${{ secrets.FTP_BACKEND_DIR }}
